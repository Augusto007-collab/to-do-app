<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster Pro | Ultra Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --high: #ff4d4d;
            --medium: #ffaa00;
            --low: #00e676;
            --text-main: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            padding: 20px;
        }

        .app-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 450px;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-weight: 800;
            font-size: 1.8rem;
            margin-bottom: 25px;
            text-align: center;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Área de Input */
        .input-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        input, select, button#add-btn {
            height: 50px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.07);
            color: white;
            padding: 0 15px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.12);
        }

        button#add-btn {
            background: var(--primary);
            border: none;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button#add-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        /* Lista de Tarefas */
        #task-list { list-style: none; }

        .task-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 4px solid #ccc;
            animation: slideIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            transition: all 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .task-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.02);
        }

        /* Cores de Prioridade */
        .p-high { border-left-color: var(--high); }
        .p-medium { border-left-color: var(--medium); }
        .p-low { border-left-color: var(--low); }

        .task-text { flex: 1; margin: 0 15px; font-weight: 500; }
        
        .completed .task-text {
            text-decoration: line-through;
            opacity: 0.4;
        }

        .actions { display: flex; gap: 10px; }

        .btn-icon {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1.1rem;
            transition: color 0.2s, transform 0.2s;
        }

        .btn-icon:hover { transform: scale(1.2); }
        .btn-check:hover { color: var(--low); }
        .btn-trash:hover { color: var(--high); }

        /* Mensagem de Conclusão */
        #toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--low);
            color: #000;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 700;
            display: none;
            animation: pop 0.4s ease forwards;
        }

        @keyframes pop {
            0% { transform: scale(0); }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="app-card">
        <h1><i class="fa-solid fa-list-check"></i> TaskMaster Pro</h1>
        
        <div class="input-section">
            <input type="text" id="task-input" placeholder="Nova tarefa..." maxlength="40">
            <select id="priority-select">
                <option value="low">🌱 Prioridade Baixa</option>
                <option value="medium">⚡ Prioridade Média</option>
                <option value="high">🔥 Prioridade Alta</option>
            </select>
            <button id="add-btn">
                <i class="fa-solid fa-plus"></i> Adicionar
            </button>
        </div>

        <ul id="task-list"></ul>
    </div>

    <div id="toast">✅ Tarefa Concluída!</div>

    <script>
        const taskInput = document.getElementById('task-input');
        const prioritySelect = document.getElementById('priority-select');
        const addBtn = document.getElementById('add-btn');
        const taskList = document.getElementById('task-list');
        const toast = document.getElementById('toast');

        // Efeitos Sonoros (Sintetizados via Web Audio API para não precisar de arquivos mp3)
        const playSound = (freq, type) => {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.3);
        };

        function showToast() {
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }

        function addTask() {
            const val = taskInput.value.trim();
            const priority = prioritySelect.value;

            if (!val) {
                playSound(150, 'square'); // Som de erro
                return;
            }

            const li = document.createElement('li');
            li.className = `task-item p-${priority}`;
            li.innerHTML = `
                <span class="task-text">${val}</span>
                <div class="actions">
                    <button class="btn-icon btn-check"><i class="fa-solid fa-circle-check"></i></button>
                    <button class="btn-icon btn-trash"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            `;

            // Botão Concluir
            li.querySelector('.btn-check').onclick = () => {
                li.classList.toggle('completed');
                if(li.classList.contains('completed')) {
                    playSound(800, 'sine'); // Som de sucesso
                    showToast();
                }
            };

            // Botão Excluir
            li.querySelector('.btn-trash').onclick = () => {
                li.style.transform = "translateX(50px)";
                li.style.opacity = "0";
                setTimeout(() => li.remove(), 300);
                playSound(200, 'sawtooth'); // Som de deletar
            };

            taskList.prepend(li); // Adiciona no topo
            taskInput.value = '';
            playSound(500, 'sine'); // Som de adição
        }

        addBtn.onclick = addTask;
        taskInput.onkeypress = (e) => { if(e.key === 'Enter') addTask() };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster Ultra | High Visibility</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --bg-gradient: linear-gradient(135deg, #020617 0%, #0f172a 100%);
            --glass-dark: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(255, 255, 255, 0.2);
            --high: #ff4d4d;
            --medium: #fbbf24;
            --low: #22c55e;
            --text-main: #ffffff;
            --input-bg: #1e293b; /* Fundo sólido para garantir leitura */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* TELA DE LOGIN */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-gradient);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: var(--glass-dark);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* INPUTS E SELETORES - CORREÇÃO DE VISIBILIDADE */
        .input-group input, .input-group select {
            width: 100%;
            height: 54px;
            border-radius: 12px;
            border: 2px solid var(--glass-border);
            background: var(--input-bg); /* Fundo escuro sólido */
            color: #ffffff; /* Texto branco puro */
            padding: 0 15px;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 10px;
            outline: none;
            transition: border-color 0.3s;
        }

        /* Estilo específico para as opções dentro do Select */
        select option {
            background-color: #1e293b; /* Fundo sólido para as opções */
            color: white;
            padding: 10px;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        /* APP CARD */
        .app-card {
            background: var(--glass-dark);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 550px;
            border-radius: 28px;
            padding: 30px;
            display: none; /* Só aparece após login */
            animation: fadeIn 0.5s ease;
        }

        h1 { font-weight: 800; margin-bottom: 25px; text-align: center; color: var(--primary); }

        button#add-btn {
            width: 100%;
            height: 54px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        button#add-btn:hover { background: #4f46e5; transform: translateY(-2px); }

        /* LISTA DE TAREFAS */
        .task-item {
            background: rgba(30, 41, 59, 0.7);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            border-left: 6px solid #444;
            transition: 0.3s;
        }

        .p-high { border-left-color: var(--high); background: rgba(255, 77, 77, 0.1); }
        .p-medium { border-left-color: var(--medium); background: rgba(251, 191, 36, 0.1); }
        .p-low { border-left-color: var(--low); background: rgba(34, 197, 94, 0.1); }

        .task-text { flex: 1; font-weight: 600; margin-left: 10px; }
        .deadline-badge { font-size: 0.75rem; color: #94a3b8; font-weight: 400; }

        /* FOOTER STATUS */
        .status-footer {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #1e293b;
            padding: 12px 24px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            display: none;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h1>Acesso</h1>
            <input type="text" id="user-name" placeholder="Digite seu nome..." style="background:#1e293b; color:white; border:2px solid #334155; padding:15px; border-radius:12px; width:100%; margin-bottom:15px;">
            <button id="add-btn" onclick="startApp()">Entrar no Sistema</button>
        </div>
    </div>

    <div class="app-card" id="app-card">
        <h1 id="welcome-title">TaskMaster</h1>
        
        <div class="input-group">
            <input type="text" id="task-input" placeholder="O que precisa ser feito?">
            
            <label style="font-size: 0.8rem; color: var(--primary); font-weight: 800; margin-bottom: 5px; display: block;">DEFINIR IMPORTÂNCIA:</label>
            <select id="priority-select">
                <option value="low" style="color: #22c55e;">🟢 PRIORIDADE BAIXA</option>
                <option value="medium" style="color: #fbbf24;">🟡 PRIORIDADE MÉDIA</option>
                <option value="high" style="color: #ff4d4d;">🔴 PRIORIDADE ALTA</option>
            </select>

            <label style="font-size: 0.8rem; color: var(--primary); font-weight: 800; margin-bottom: 5px; display: block;">PRAZO FINAL:</label>
            <input type="datetime-local" id="task-deadline">
            
            <button id="add-btn" onclick="addTask()">Adicionar Tarefa</button>
        </div>

        <ul id="task-list" style="list-style:none"></ul>
    </div>

    <div class="status-footer" id="status-footer">
        <span><i class="fa-solid fa-calendar-day"></i> <span id="current-date"></span></span>
        <span><i class="fa-solid fa-stopwatch"></i> <span id="session-timer">00:00</span></span>
    </div>

    <script>
        // Funções de som e transição (as mesmas da versão anterior, otimizadas)
        function playSound(freq, type) {
            const ctx = new AudioContext();
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.type = type; o.frequency.value = freq;
            g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.5);
            o.connect(g); g.connect(ctx.destination);
            o.start(); o.stop(ctx.currentTime + 0.5);
        }

        function startApp() {
            const name = document.getElementById('user-name').value;
            if(!name) return alert("Por favor, identifique-se.");
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-card').style.display = 'block';
            document.getElementById('status-footer').style.display = 'flex';
            document.getElementById('welcome-title').innerText = `Workspace: ${name}`;
            startTimers();
            playSound(500, 'sine');
        }

        function startTimers() {
            setInterval(() => {
                document.getElementById('current-date').innerText = new Date().toLocaleString('pt-BR');
            }, 1000);

            let sec = 0;
            setInterval(() => {
                sec++;
                let m = Math.floor(sec/60).toString().padStart(2,'0');
                let s = (sec%60).toString().padStart(2,'0');
                document.getElementById('session-timer').innerText = `${m}:${s}`;
            }, 1000);
        }

        function addTask() {
            const input = document.getElementById('task-input');
            const priority = document.getElementById('priority-select');
            const deadline = document.getElementById('task-deadline');

            if(!input.value) return playSound(150, 'square');

            const li = document.createElement('li');
            li.className = `task-item p-${priority.value}`;
            const dateStr = deadline.value ? new Date(deadline.value).toLocaleString('pt-BR') : "Sem prazo";

            li.innerHTML = `
                <div style="flex:1">
                    <div class="task-text">${input.value}</div>
                    <div class="deadline-badge"><i class="fa-regular fa-clock"></i> ${dateStr}</div>
                </div>
                <button onclick="this.parentElement.style.opacity='0.4'; playSound(800,'sine')" style="background:none; border:none; color:#22c55e; cursor:pointer; font-size:1.5rem; margin-right:10px;"><i class="fa-solid fa-check-double"></i></button>
                <button onclick="this.parentElement.remove(); playSound(200,'sawtooth')" style="background:none; border:none; color:#ff4d4d; cursor:pointer; font-size:1.5rem;"><i class="fa-solid fa-trash-can"></i></button>
            `;

            document.getElementById('task-list').prepend(li);
            input.value = '';
            playSound(400, 'sine');
        }
    </script>
</body>
</html>
